
services:
  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8000:8000"
    depends_on:
      mysql_db:
        condition: service_healthy
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: mysql_db
      DB_PORT: 3306
      DB_DATABASE: biblioteca_gateway
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD}
      BOOKS_SERVICE_URL: http://books-microservice:5000
      SALES_SERVICE_URL: http://sales-microservice:3001
      LOANS_SERVICE_URL: http://loans-microservice:3002
      FINES_SERVICE_URL: http://fines-microservice:8001
      REPORTS_SERVICE_URL: http://reports-microservice:5001
      INTERNAL_API_KEY: "123"
    restart: unless-stopped

  books-service:
    build: ./microservices/books
    container_name: books-microservice
    ports:
      - "5000:5000"
    depends_on:
      mysql_db:
        condition: service_healthy
    environment:
      FLASK_APP: app.py
      FLASK_ENV: production
      DB_HOST: mysql_db
      DB_PORT: 3306
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DATABASE_URL: mysql+pymysql://${DB_USER}:${DB_PASSWORD}@mysql_db:3306/${DB_NAME}
      INTERNAL_API_KEY: "123"
    restart: unless-stopped

  fines-service:
    build: ./microservices/fines
    container_name: fines-microservice
    ports:
      - "8001:8001"
    depends_on:
      postgres_db:
        condition: service_healthy
    environment:
      DB_HOST: postgres_db
      DB_PORT: 5432
      DB_USER: ${DB_USER_POSTGRES}
      DB_PASSWORD: ${DB_PASSWORD_POSTGRES}
      DB_NAME: ${DB_NAME_POSTGRES}
      DJANGO_SETTINGS_MODULE: fines_service.settings
      INTERNAL_API_KEY: "123"
    restart: unless-stopped

  loans-service:
    build: ./microservices/loans
    container_name: loans-microservice
    ports:
      - "3002:3002"
    depends_on:
      mongo_db:
        condition: service_healthy
    environment:
      PORT: 3002
      MONGO_URI: mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongo_db:27017/${MONGO_DB}?authSource=admin
      FLASK_URL: http://books-microservice:5000
      FINES_URL: http://fines-microservice:8001
      INTERNAL_API_KEY: "123"
    restart: unless-stopped

  sales-service:
    build: ./microservices/sales
    container_name: sales-microservice
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      FIREBASE_DB_URL: ${FIREBASE}
      INTERNAL_API_KEY: "123"
    restart: unless-stopped

  reports-service:
    build: ./microservices/reports
    container_name: reports-microservice
    ports:
      - "5001:5001"
    depends_on:
      mongo_db:
        condition: service_healthy
    environment:
      MONGO_URI: mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongo_db:27017/reports_db?authSource=admin
      BOOKS_URL: http://books-microservice:5000
      LOANS_URL: http://loans-microservice:3002
      FINES_URL: http://fines-microservice:8001
      SALES_URL: http://sales-microservice:3001
      INTERNAL_API_KEY: "123"
    restart: unless-stopped

  mysql_db:
    image: mysql:8.0
    container_name: mysql_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  postgres_db:
    image: postgres:13
    container_name: postgres_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER_POSTGRES}
      POSTGRES_PASSWORD: ${DB_PASSWORD_POSTGRES}
      POSTGRES_DB: ${DB_NAME_POSTGRES}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER_POSTGRES}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  mongo_db:
    image: mongo:8
    container_name: mongo_db
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  mysql_data:
  postgres_data:
  mongo_data:
